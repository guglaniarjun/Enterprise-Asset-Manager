          type: string
        classId:
          type: integer
        className:
          type: string
        sectionId:
          type: integer
          nullable: true
        sectionName:
          type: string
          nullable: true
        subjectId:
          type: integer
        subjectName:
          type: string
        academicYear:
          type: string
        month:
          type: integer
        week:
          type: integer
          nullable: true
        chapter:
          type: string
