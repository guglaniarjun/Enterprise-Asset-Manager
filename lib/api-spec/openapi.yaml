        data:
          type: array
          items:
            $ref: "#/components/schemas/TeacherAssignmentItem"
      required: [data]

    # ── Students ─────────────────────────────────────────────────────────────────

    StudentItem:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        branchId:
          type: integer
        admissionNo:
          type: string
        name:
          type: string
        classId:
          type: integer
        className:
          type: string
        sectionId:
          type: integer
        sectionName:
          type: string
        rollNo:
          type: string
          nullable: true
        fatherName:
          type: string
          nullable: true
        motherName:
          type: string
          nullable: true
        parentContact:
          type: string
          nullable: true
        houseId:
          type: integer
          nullable: true
        houseName:
          type: string
          nullable: true
        status:
          type: string
