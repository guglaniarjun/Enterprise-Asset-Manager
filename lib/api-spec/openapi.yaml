openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Springfield AI Command Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: roles
    description: Role management
  - name: branches
    description: Branch management
  - name: classes
    description: Class management
  - name: sections
    description: Section management
  - name: subjects
    description: Subject management
  - name: houses
    description: House management
  - name: teacher-assignments
    description: Teacher assignment management
  - name: students
    description: Student management
  - name: syllabus
    description: Syllabus breakup management
  - name: logs
    description: Daily class log management
  - name: events
    description: Student log events
  - name: ocr
    description: OCR upload
  - name: dashboard
    description: Dashboard analytics
  - name: tasks
    description: Task management
  - name: alerts
    description: Alert management
  - name: notifications
    description: Notification management
  - name: audit-logs
    description: Audit log viewer
  - name: exports
    description: Excel exports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile and roles
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Users ─────────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/roles:
    post:
      operationId: assignRole
      tags: [users]
      summary: Assign role to user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "201":
          description: Role assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Branches ──────────────────────────────────────────────────────────────────

  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List branches
      responses:
        "200":
          description: Branches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchesListResponse"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchItem"

  # ── Classes ───────────────────────────────────────────────────────────────────

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes
      responses:
        "200":
          description: Classes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassesListResponse"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassItem"

  /classes/{id}:
    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassRequest"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassItem"

  # ── Sections ──────────────────────────────────────────────────────────────────

  /sections:
    get:
      operationId: listSections
      tags: [sections]
      summary: List sections
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionsListResponse"
    post:
      operationId: createSection
      tags: [sections]
      summary: Create section
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionRequest"
      responses:
        "201":
          description: Section created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionItem"

  /sections/{id}:
    patch:
      operationId: updateSection
      tags: [sections]
      summary: Update section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSectionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionItem"

  # ── Subjects ──────────────────────────────────────────────────────────────────

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List subjects
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Subjects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectsListResponse"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectRequest"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectItem"

  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubjectRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectItem"

  # ── Houses ────────────────────────────────────────────────────────────────────

  /houses:
    get:
      operationId: listHouses
      tags: [houses]
      summary: List houses
      responses:
        "200":
          description: Houses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HousesListResponse"
    post:
      operationId: createHouse
      tags: [houses]
      summary: Create house
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHouseRequest"
      responses:
        "201":
          description: House created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseItem"

  # ── Teacher Assignments ───────────────────────────────────────────────────────

  /teacher-assignments:
    get:
      operationId: listTeacherAssignments
      tags: [teacher-assignments]
      summary: List teacher assignments
      parameters:
        - name: teacherId
          in: query
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: sectionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Teacher assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherAssignmentsListResponse"
    post:
      operationId: createTeacherAssignment
      tags: [teacher-assignments]
      summary: Create teacher assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeacherAssignmentRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherAssignmentItem"

  /teacher-assignments/{id}:
    patch:
      operationId: updateTeacherAssignment
      tags: [teacher-assignments]
      summary: Update teacher assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherAssignmentRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherAssignmentItem"
    delete:
      operationId: deleteTeacherAssignment
      tags: [teacher-assignments]
      summary: Delete teacher assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Students ──────────────────────────────────────────────────────────────────

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
        - name: sectionId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Students
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentsListResponse"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentItem"

  /students/import/preview:
    post:
      operationId: previewStudentImport
      tags: [students]
      summary: Preview CSV/Excel import (no DB write)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPreviewRequest"
      responses:
        "200":
          description: Import preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreviewResponse"

  /students/import/confirm:
    post:
      operationId: confirmStudentImport
      tags: [students]
      summary: Confirm and commit student import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportConfirmRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportConfirmResponse"

  /students/{id}/events:
    get:
      operationId: getStudentEvents
      tags: [students]
      summary: Get all events for a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Student events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentEventsListResponse"

  # ── Syllabus ──────────────────────────────────────────────────────────────────

  /syllabus:
    get:
      operationId: listSyllabus
      tags: [syllabus]
      summary: List syllabus breakups
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
        - name: sectionId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: teacherId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Syllabus list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusListResponse"
    post:
      operationId: createSyllabus
      tags: [syllabus]
      summary: Create syllabus entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSyllabusRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusItem"

  /syllabus/{id}:
    get:
      operationId: getSyllabus
      tags: [syllabus]
      summary: Get syllabus entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Syllabus entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusItem"
    patch:
      operationId: updateSyllabus
      tags: [syllabus]
      summary: Update syllabus entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyllabusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusItem"

  /syllabus/{id}/verify:
    patch:
      operationId: verifySyllabus
      tags: [syllabus]
      summary: Coordinator verifies a syllabus entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySyllabusRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusItem"

  /syllabus/summary:
    get:
      operationId: getSyllabusSummary
      tags: [syllabus]
      summary: Syllabus completion summary
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyllabusSummaryResponse"

  # ── Daily Class Logs ──────────────────────────────────────────────────────────

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List daily class logs
      parameters:
        - name: teacherId
          in: query
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
        - name: sectionId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
        - name: verificationStatus
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Logs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsListResponse"
    post:
      operationId: createLog
      tags: [logs]
      summary: Create daily class log (draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLogRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogItem"

  /logs/{id}:
    get:
      operationId: getLog
      tags: [logs]
      summary: Get log detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLog
      tags: [logs]
      summary: Update log (before verification)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLogRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogItem"

  /logs/{id}/submit:
    post:
      operationId: submitLog
      tags: [logs]
      summary: Submit log for verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogItem"

  /logs/{id}/verify:
    post:
      operationId: verifyLog
      tags: [logs]
      summary: Coordinator verifies a log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyLogRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogItem"

  /logs/{id}/reject:
    post:
      operationId: rejectLog
      tags: [logs]
      summary: Coordinator rejects a log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectLogRequest"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogItem"

  /logs/missing:
    get:
      operationId: getMissingLogs
      tags: [logs]
      summary: Get missing logs for a date
      parameters:
        - name: date
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Missing logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingLogsResponse"

  /logs/compliance:
    get:
      operationId: getCompliance
      tags: [logs]
      summary: Teacher compliance report
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: teacherId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceResponse"

  # ── Student Log Events ────────────────────────────────────────────────────────

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List student log events
      parameters:
        - name: studentId
          in: query
          schema:
            type: integer
        - name: classId
          in: query
          schema:
            type: integer
