    StudentDetail:
      allOf:
        - $ref: "#/components/schemas/StudentItem"
        - type: object
          properties:
            recentEvents:
              type: array
              items:
                $ref: "#/components/schemas/EventItem"
          required: [recentEvents]

    UpdateStudentRequest:
      type: object
      properties:
        name:
          type: string
        classId:
          type: integer
        sectionId:
          type: integer
        rollNo:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        parentContact:
          type: string
        houseId:
          type: integer
        status:
          type: string

