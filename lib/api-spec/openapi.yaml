components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    # ── Auth ────────────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [accessToken, refreshToken, user]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
      required: [accessToken]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        forcePasswordChange:
          type: boolean
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRoleItem"
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, email, name, isActive, forcePasswordChange, roles, createdAt]

    UserRoleItem:
      type: object
      properties:
        roleId:
          type: integer
        roleName:
          type: string
        branchId:
          type: integer
          nullable: true
      required: [roleId, roleName]

    # ── Users ───────────────────────────────────────────────────────────────────

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        phone:
          type: string
      required: [email, password, name]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        isActive:
          type: boolean

    AssignRoleRequest:
      type: object
      properties:
        roleId:
          type: integer
        branchId:
          type: integer
          nullable: true
      required: [roleId]

    UsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    # ── Branches ─────────────────────────────────────────────────────────────────

    BranchItem:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        code:
          type: string
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, name, code, isActive, createdAt]

    CreateBranchRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        address:
          type: string
      required: [name, code]

    BranchesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BranchItem"
      required: [data]

    # ── Classes ──────────────────────────────────────────────────────────────────

    ClassItem:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        branchId:
          type: integer
        name:
          type: string
        numericLevel:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, branchId, name, numericLevel, isActive, createdAt]

    CreateClassRequest:
      type: object
      properties:
        branchId:
          type: integer
        name:
          type: string
        numericLevel:
          type: integer
      required: [branchId, name, numericLevel]

    UpdateClassRequest:
      type: object
      properties:
        name:
          type: string
        isActive:
          type: boolean

    ClassesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ClassItem"
      required: [data]

    # ── Sections ─────────────────────────────────────────────────────────────────

    SectionItem:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        branchId:
          type: integer
        classId:
