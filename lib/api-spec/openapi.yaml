          type: integer
        branchId:
          type: integer
        teacherId:
          type: integer
        teacherName:
          type: string
        classId:
          type: integer
        className:
          type: string
        sectionId:
          type: integer
        sectionName:
          type: string
        subjectId:
          type: integer
        subjectName:
          type: string
        academicYear:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
