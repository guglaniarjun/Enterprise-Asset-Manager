        color:
          type: string
          nullable: true
        isActive:
          type: boolean
      required: [id, tenantId, name, isActive]

    CreateHouseRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
      required: [name]

    HousesListResponse:
      type: object
