# Springfield AI Command Center — VPS deployment stack.
#
# Usage:
#   cp .env.example .env   # then edit the secrets
#   docker compose up -d --build
#
# Services:
#   db  - PostgreSQL 16 with a persistent named volume
#   api - Express API (applies schema + optional seed on start)
#   web - Nginx serving the SPA and proxying /api to the api service
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-springfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-springfield}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-springfield} -d ${POSTGRES_DB:-springfield}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-springfield}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-springfield}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      SESSION_SECRET: ${SESSION_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ON_START: ${SEED_ON_START:-false}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
